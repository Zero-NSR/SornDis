<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SR0N STORE</title>
    <style>
        :root { --main: #007aff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #111; border-radius: 30px; padding: 40px 20px; border: 1px solid #222; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 10px; letter-spacing: 2px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .btn { background: linear-gradient(135deg, #007aff, #00d4ff); color: white; padding: 18px; border-radius: 50px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-bottom: 15px; display: block; text-decoration: none; }
        .btn-alt { background: #222; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SR0N <span style="color:var(--main)">STORE</span></h1>
        <p>الشهادة: Forevermark (2026)</p>
        
        <button onclick="downloadConfig()" class="btn">1. تثبيت الشهادة</button>
        
        <button onclick="installApp()" class="btn btn-alt">2. تحميل التطبيق</button>
    </div>

    <script>
        // رابط حسابك ومستودعك
        const user = "Zero-NSR";
        const repo = "SornDis";

        function downloadConfig() {
            // الرابط السحري اللي يمنع ظهور الأكواد ويفتح الإعدادات فوراً
            const configUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/SR0N.mobileconfig`;
            
            // تنبيه للمستخدم
            alert("سيفتح لك 'سماح' الآن.. اضغط عليه ثم اذهب للإعدادات > تم تنزيل ملف التعريف > تثبيت.");
            
            // البدء بالتحويل
            window.location.href = configUrl;
        }

        function installApp() {
            const plistUrl = `https://${user}.github.io/${repo}/manifest_delta.plist`;
            window.location.href = "itms-services://?action=download-manifest&url=" + plistUrl;
        }
    </script>

</body>
</html>
