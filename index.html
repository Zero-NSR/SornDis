<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorn Store - الذكاء في التثبيت</title>
    <style>
        :root { --main: #007aff; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 25px; padding: 25px; max-width: 400px; margin: auto; }
        .btn-install { background: var(--main); color: white; padding: 18px; border-radius: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; }
        .status-msg { font-size: 13px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="appNameDisplay">اسم التطبيق</h2>
        <p class="status-msg">سيتم تثبيت ملف التعريف ثم التطبيق تلقائياً</p>
        
        <button class="btn-install" onclick="smartInstall()">تثبيت الآن (شهادة + تطبيق)</button>
        
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // البيانات (تقدر تخليها متغيرة حسب التطبيق)
        const appInfo = {
            name: "Redz App",
            ipa: "https://example.com/app.ipa", // حط رابط الـ IPA هنا
            bundleId: "com.sorn.store",
            team: "Sorn Team"
        };

        document.getElementById('appNameDisplay').innerText = appInfo.name;

        function smartInstall() {
            const status = document.getElementById('status');
            
            // 1. تشغيل تثبيت ملف التعريف أولاً
            status.innerText = "جاري تجهيز الشهادة...";
            installProfile();

            // 2. تأخير بسيط ثم تشغيل تثبيت الـ IPA
            setTimeout(() => {
                status.innerText = "جاري طلب تثبيت التطبيق...";
                installIPA();
            }, 3000); // ننتظر 3 ثواني عشان نلحق نفتح ملف التعريف
        }

        function installProfile() {
            const uuid = "SORN-" + Math.random().toString(36).substring(7).toUpperCase();
            const config = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key><array/>
    <key>PayloadDisplayName</key><string>Sorn Cert (${appInfo.bundleId})</string>
    <key>PayloadIdentifier</key><string>com.sorn.profile.${uuid}</string>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${uuid}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;

            const base64 = btoa(unescape(encodeURIComponent(config)));
            window.location.href = 'data:application/x-apple-aspen-config;base64,' + base64;
        }

        function installIPA() {
            const plist = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${appInfo.ipa}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${appInfo.bundleId}</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>${appInfo.name}</string></dict></dict></array></dict></plist>`;
            
            const base64Plist = btoa(unescape(encodeURIComponent(plist)));
            window.location.href = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64Plist}`;
        }
    </script>
</body>
</html>
