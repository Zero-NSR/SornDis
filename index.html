<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SornDis | Delta</title>
    <style>
        :root { --accent: #007aff; --bg: #000; --card-bg: #111; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 400px; margin: 50px auto; }
        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--accent); color: white; padding: 18px; border-radius: 18px; border: none; width: 100%; font-weight: 700; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .st { margin-top: 20px; font-size: 0.85rem; color: #888; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Sorn<span style="color:var(--accent)">Dis</span></h1>
            <div style="margin: 25px 0;">
                <h3 style="margin: 5px 0;">Delta</h3>
                <span style="font-size: 0.8rem; background: #222; padding: 4px 10px; border-radius: 10px; color:#aaa;">2.710</span>
            </div>
            
            <button class="btn" onclick="startProcess()">تثبيت (الشهادة + التطبيق)</button>
            
            <div id="st" class="st"></div>
        </div>
    </div>

    <script>
        async function startProcess() {
            const st = document.getElementById('st');
            st.innerText = "جاري تحليل الشهادة...";

            try {
                // 1. جلب ملف الشهادة الأصلي من مستودعك
                const response = await fetch('https://zero-nsr.github.io/SornDis/cert.mobileprovision');
                const arrayBuffer = await response.arrayBuffer();
                const content = new TextDecoder('ascii').decode(arrayBuffer);

                // 2. تحليل البيانات تلقائياً (Bundle ID & Team Name)
                const bidMatch = content.match(/<key>application-identifier<\/key>\s*<string>(.*?)<\/string>/);
                const teamMatch = content.match(/<key>TeamName<\/key>\s*<string>(.*?)<\/string>/);
                
                let bid = bidMatch ? bidMatch[1].split('.').slice(1).join('.') : "com.forevermark.config";
                let team = teamMatch ? teamMatch[1] : "Forevermark Marketing";
                const uuid = "SORN-" + Math.random().toString(36).substring(7).toUpperCase();

                // 3. بناء ملف التعريف (MobileConfig)
                const config = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadDisplayName</key><string>${team}</string>
            <key>PayloadIdentifier</key><string>com.apple.mgmt.${uuid}</string>
            <key>PayloadOrganization</key><string>${team}</string>
            <key>PayloadType</key><string>Configuration</string>
            <key>PayloadUUID</key><string>${uuid}-sub</string>
            <key>PayloadVersion</key><integer>1</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key><string>Sorn VIP: ${team}</string>
    <key>PayloadIdentifier</key><string>${bid}</string>
    <key>PayloadOrganization</key><string>${team}</string>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${uuid}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;

                // 4. تشغيل تثبيت ملف التعريف
                window.location.href = 'data:application/x-apple-aspen-config;base64,' + btoa(unescape(encodeURIComponent(config)));

                // 5. تأخير ثم طلب تثبيت التطبيق
                setTimeout(() => {
                    st.innerText = "وافق على التثبيت الآن";
                    window.location.href = "itms-services://?action=download-manifest&url=https://zero-nsr.github.io/SornDis/manifest_delta.plist";
                }, 4000);

            } catch (e) {
                st.innerText = "فشل في ربط الشهادة.. تأكد من وجود cert.mobileprovision";
            }
        }
    </script>
</body>
</html>
