<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SornDis</title>
    <style>
        :root { --accent: #007aff; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; border: 1px solid #222; border-radius: 30px; padding: 30px; max-width: 350px; margin: 50px auto; }
        .btn { background: var(--accent); color: white; padding: 18px; border-radius: 18px; border: none; width: 100%; font-weight: 700; cursor: pointer; }
        .st { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sorn<span style="color:var(--accent)">Dis</span></h1>
        <p style="color:#888; font-size:14px;">تحديث Delta 2.710</p>
        <button class="btn" onclick="install()">تثبيت الشهادة والتطبيق</button>
        <div id="st" class="st"></div>
    </div>

    <script>
        async function install() {
            const st = document.getElementById('st');
            st.innerText = "جاري تفعيل شهادة Forevermark...";

            try {
                // 1. جلب بيانات الشهادة الحقيقية من مستودعك
                const res = await fetch('https://zero-nsr.github.io/SornDis/cert.mobileprovision');
                const buffer = await res.arrayBuffer();
                const content = new TextDecoder('ascii').decode(buffer);

                // استخراج المعرفات الحقيقية للشهادة
                const team = content.match(/<key>TeamName<\/key>\s*<string>(.*?)<\/string>/)?.[1] || "Forevermark";
                const uuid = "SORN-" + Math.random().toString(36).substring(7).toUpperCase();

                // 2. بناء ملف تعريف "موثوق" يربط الجهاز بالشهادة
                const config = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadType</key><string>com.apple.webclip.managed</string>
            <key>PayloadIdentifier</key><string>com.sorn.trust</string>
            <key>PayloadUUID</key><string>${uuid}-1</string>
            <key>PayloadVersion</key><integer>1</integer>
            <key>Label</key><string>Sorn VIP Trust</string>
            <key>URL</key><string>https://zero-nsr.github.io/SornDis/</string>
        </dict>
    </array>
    <key>PayloadDisplayName</key><string>Trust Forevermark: ${team}</string>
    <key>PayloadIdentifier</key><string>com.sorn.forevermark</string>
    <key>PayloadOrganization</key><string>${team}</string>
    <key>PayloadType</key><string>Configuration</string>
    <key>PayloadUUID</key><string>${uuid}</string>
    <key>PayloadVersion</key><integer>1</integer>
</dict>
</plist>`;

                // تشغيل ملف التعريف
                window.location.href = 'data:application/x-apple-aspen-config;base64,' + btoa(unescape(encodeURIComponent(config)));

                // 3. طلب تثبيت التطبيق بعد وقت كافٍ
                setTimeout(() => {
                    st.innerText = "الآن اضغط 'تثبيت' وقم بالوثوق من الإعدادات";
                    window.location.href = "itms-services://?action=download-manifest&url=https://zero-nsr.github.io/SornDis/manifest_delta.plist";
                }, 5000);

            } catch (e) {
                st.innerText = "خطأ: تأكد من وجود ملف cert.mobileprovision";
            }
        }
    </script>
</body>
</html>
