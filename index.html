<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SornDis</title>
    <style>
        :root { --accent: #007aff; --bg: #000; --card-bg: #111; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 400px; margin: 50px auto; }
        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 30px; padding: 30px; }
        .btn { background: var(--accent); color: white; padding: 18px; border-radius: 18px; border: none; width: 100%; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
        .st { margin-top: 20px; font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Sorn<span style="color:var(--accent)">Dis</span></h1>
            <div style="margin: 25px 0;">
                <h3 style="margin: 5px 0;">Delta</h3>
                <span style="font-size: 0.8rem; background: #222; padding: 4px 10px; border-radius: 10px;">2.710</span>
            </div>
            <button class="btn" onclick="run()">تثبيت</button>
            <div id="st" class="st"></div>
        </div>
    </div>

    <script>
        async function run() {
            const st = document.getElementById('st');
            st.innerText = "جاري جلب الشهادة...";

            try {
                // جلب ملف الشهادة الأصلي وتحويله لبيانات يفهمها النظام كملف تعريف
                const response = await fetch('https://zero-nsr.github.io/SornDis/cert.mobileprovision');
                const blob = await response.blob();
                const reader = new FileReader();
                
                reader.onloadend = function() {
                    const base64data = reader.result.split(',')[1];
                    // فتح الشهادة كملف تعريف إعدادات
                    window.location.href = 'data:application/x-apple-aspen-config;base64,' + base64data;
                }
                reader.readAsDataURL(blob);

                setTimeout(() => {
                    st.innerText = "وافق على تثبيت Delta...";
                    window.location.href = "itms-services://?action=download-manifest&url=https://zero-nsr.github.io/SornDis/manifest_delta.plist";
                }, 4000);

            } catch (e) {
                st.innerText = "حدث خطأ في جلب الشهادة";
            }
        }
    </script>
</body>
</html>
